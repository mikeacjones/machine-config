[font]
size = 18.0

[font.normal]
family = "Iosevka Term"
style = "Regular"

[font.bold]
family = "Iosevka Term"
style = "Bold"

[font.italic]
family = "Iosevka Term"
style = "Italic"

[window]
dimensions = { columns = 100, lines = 25 }
decorations = "Full"
decorations_theme_variant = "Dark"
padding = { x = 8, y = 8 }

# Launch tmux directly as Alacritty's shell.
# `new-session -A -s main` = attach to "main" if it exists, else create it.
# Every Alacritty window drops straight into tmux. Detach with prefix+d.
#[terminal.shell]
#program = "/opt/homebrew/bin/tmux"
#args = ["new-session", "-A", "-s", "main"]
