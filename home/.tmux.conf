# --- mouse / click-to-focus ---
# Mouse off: tmux ignores clicks/drags so they pass to Alacritty (native
# selection, click positioning). Note: this also disables scroll-wheel
# scrolling inside tmux. Set back to `on` to re-enable both.
set -g mouse off

# --- quality-of-life (cheap, no startup cost) ---
set -sg escape-time 0            # no delay after pressing Esc (matters for vim)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor passthrough
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1

# --- open new windows/panes in the CURRENT pane's directory ---
# Default is the dir the tmux server started in; #{pane_current_path} inherits
# the cwd of the pane you're in when you hit the key.
bind c new-window   -c "#{pane_current_path}"   # prefix c  : new window
bind '"' split-window   -c "#{pane_current_path}"   # prefix "  : horizontal split
bind %   split-window -h -c "#{pane_current_path}"  # prefix %  : vertical split
